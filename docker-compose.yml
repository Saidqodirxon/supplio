version: "3.9"

services:
  db:
    image: postgres:15-alpine
    container_name: supplio_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-supplio}
      POSTGRES_PASSWORD: ${DB_PASS:-supplio_secret}
      POSTGRES_DB: ${DB_NAME:-supplio_main}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-supplio} -d ${DB_NAME:-supplio_main}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: supplio_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${DB_USER:-supplio}:${DB_PASS:-supplio_secret}@db:5432/${DB_NAME:-supplio_main}
      JWT_SECRET: ${JWT_SECRET}
      PORT: 3000
      NODE_ENV: ${NODE_ENV:-production}
      APP_URL: ${APP_URL:-https://api.supplio.uz}
      PUBLIC_STORE_URL: ${PUBLIC_STORE_URL:-https://supplio.uz}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_ADMIN_CHAT_ID: ${TELEGRAM_ADMIN_CHAT_ID:-}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/backups:/app/backups
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: supplio_dashboard
    restart: unless-stopped
    ports:
      - "3001:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  landing:
    build:
      context: ./landing
      dockerfile: Dockerfile
    container_name: supplio_landing
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.supplio.uz}
    ports:
      - "3002:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  proxy:
    image: nginx:1.25-alpine
    container_name: supplio_nginx
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      backend:
        condition: service_healthy
      dashboard:
        condition: service_healthy
      landing:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nginx -t && wget -qO- http://localhost:80/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
    driver: local
