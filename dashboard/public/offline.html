<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Supplio — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Outfit', system-ui, -apple-system, sans-serif;
      background: #020617;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }
    .container {
      text-align: center;
      max-width: 400px;
    }
    .icon {
      width: 80px;
      height: 80px;
      border-radius: 1.25rem;
      background: rgba(37, 99, 235, 0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 2rem;
    }
    .icon svg {
      width: 40px;
      height: 40px;
      color: #2563eb;
    }
    h1 {
      font-size: 1.75rem;
      font-weight: 900;
      margin-bottom: 0.75rem;
      letter-spacing: -0.03em;
    }
    p {
      color: #94a3b8;
      font-size: 0.9rem;
      line-height: 1.6;
      margin-bottom: 2rem;
    }
    button {
      padding: 0.875rem 2rem;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 0.75rem;
      font-size: 0.875rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #1d4ed8; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M18.364 5.636a9 9 0 010 12.728M15.536 8.464a5 5 0 010 7.072M13 12a1 1 0 11-2 0 1 1 0 012 0z" />
      </svg>
    </div>
    <h1>Internet yo'q</h1>
    <p>Hozir internet aloqasi mavjud emas. Sahifa onlayn bo'lganda avtomatik yangilanadi.</p>
    <button onclick="window.location.reload()">Qayta urinish</button>
  </div>
</body>
</html>
